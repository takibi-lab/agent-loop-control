name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  UV_INDEX_STRATEGY: first-index
  UV_PYTHON_DOWNLOADS: never

jobs:
  test:
    name: Tests and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv==0.9.18

      - name: Check lockfile
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      - name: Run ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

  supply-chain:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv==0.9.18

      - name: Check lockfile
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      - name: Export locked dependency set
        run: |
          uv export \
            --locked \
            --all-groups \
            --no-emit-project \
            --format requirements.txt \
            --output-file /tmp/requirements-audit.txt \
            >/dev/null

      - name: Audit Python dependencies
        run: uv run pip-audit --strict --disable-pip --require-hashes -r /tmp/requirements-audit.txt
