repos:
  - repo: local
    hooks:
      - id: check-docs-hygiene
        name: Check docs for local path leaks
        entry: python scripts/check-docs-hygiene.py
        language: system
        files: ^(README\.md|docs/.*\.md)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
